            }
        });

        // Resize layout on window resize
        window.addEventListener('resize', () => {
            resetLayout();
        });

        function resetLayout() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth >= 768) {
                sidebar.style.height = '100%';
                sidebar.style.width = '24rem'; // w-96
            } else {
                sidebar.style.width = '100%';
                setSheetState(sheetState); // Apply height based on state
            }
        }

        // Locate User GPS
        function locateUser() {
            map.locate({setView: true, maxZoom: 16});
        }

        map.on('locationfound', (e) => {
            const radius = e.accuracy;
            
            if (userLocationMarker) {
                map.removeLayer(userLocationMarker);
            }
            if (userLocationCircle) {
                map.removeLayer(userLocationCircle);
            }
            
            userLocationMarker = L.marker(e.latlng, {
                icon: L.divIcon({
                    className: 'user-location-marker',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                })
            }).addTo(map);
            
            userLocationCircle = L.circle(e.latlng, radius, {
                color: '#0ea5e9',
                fillColor: '#0ea5e9',
                fillOpacity: 0.15,
                weight: 1
            }).addTo(map);
        });

        map.on('locationerror', (e) => {
            alert("فشل في تحديد موقعك الحالي. تأكد من تفعيل خدمة تحديد المواقع GPS.");
        });

        // Initial setup
        if (window.innerWidth < 768) {
            setSheetState(1); // Start at half-height on mobile
        } else {
            resetLayout();
        }
        
        applyFilters();
    </script>
</body>
</html>
